name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK (debug + release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Copy .pyz to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp dist/payload_toolkit.pyz android/app/src/main/assets/
          echo "Asset size: $(wc -c < dist/payload_toolkit.pyz) bytes"

      - name: Generate CI signing key
        run: |
          keytool -genkeypair \
            -keystore ci-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias ci-key \
            -storepass ci-store-pass \
            -keypass ci-key-pass \
            -dname "CN=CI, OU=CI, O=PayloadToolkit, L=CI, ST=CI, C=US"

      - name: Build APKs (debug + release)
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          echo "--- Building debug APK ---"
          ./gradle-8.6/bin/gradle :app:assembleDebug --no-daemon --stacktrace
          echo "--- Building release APK ---"
          ./gradle-8.6/bin/gradle :app:assembleRelease \
            -PciSigning=true \
            -PciKeystoreFile=../ci-keystore.jks \
            -PciKeystorePass=ci-store-pass \
            -PciKeyAlias=ci-key \
            -PciKeyPass=ci-key-pass \
            --no-daemon --stacktrace

      - name: Locate and collect APKs
        if: always()
        run: |
          echo "=== Scanning for APK files ==="
          find android/app/build -type f -name '*.apk' 2>/dev/null | while read f; do
            size=$(wc -c < "$f")
            echo "  FOUND: $f ($size bytes)"
          done
          echo ""
          echo "=== Build output tree ==="
          find android/app/build/outputs -type f 2>/dev/null | sort || echo "(empty)"
          echo ""
          # Collect APKs to a known location for upload
          mkdir -p artifacts
          find android/app/build -type f -name '*.apk' -exec cp {} artifacts/ \;
          ls -la artifacts/ 2>/dev/null || echo "No APKs collected"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: artifacts/*debug*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: artifacts/*release*.apk
          if-no-files-found: warn
          retention-days: 7
