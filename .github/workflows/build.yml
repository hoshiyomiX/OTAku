name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-rust:
    name: Build Rust native library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust .so (all ABIs)
        working-directory: rust
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -o ../android/app/src/main/jniLibs \
            build --release

      - name: Verify .so outputs
        run: |
          echo "=== arm64-v8a ==="
          ls -lh android/app/src/main/jniLibs/arm64-v8a/ || echo "MISSING"
          echo "=== armeabi-v7a ==="
          ls -lh android/app/src/main/jniLibs/armeabi-v7a/ || echo "MISSING"

          # Verify .so files exist and are valid ELF
          for abi in arm64-v8a armeabi-v7a; do
            SO_FILE="android/app/src/main/jniLibs/$abi/libotaku_native.so"
            if [ ! -f "$SO_FILE" ]; then
              echo "ERROR: $SO_FILE not found!"
              exit 1
            fi
            SIZE=$(stat -c%s "$SO_FILE" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 100000 ]; then
              echo "WARNING: $SO_FILE is suspiciously small ($SIZE bytes)"
            else
              echo "[OK] $SO_FILE: $(numfmt --to=iec $SIZE)"
            fi
          done

      - name: Upload Rust native libs
        uses: actions/upload-artifact@v4
        with:
          name: rust-native-libs
          path: android/app/src/main/jniLibs/
          retention-days: 1

  build-android:
    name: Build APK (${{ matrix.target.label }})
    needs: build-rust
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - { flavor: Arm7, abi: arm7, label: ARMv7 }
          - { flavor: Arm8, abi: arm8, label: ARMv8 }
          - { flavor: Universal, abi: universal, label: Universal }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Rust native libs
        uses: actions/download-artifact@v4
        with:
          name: rust-native-libs
          path: android/app/src/main/jniLibs/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build release APK
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle :app:assemble${{ matrix.target.flavor }}Release --no-daemon --stacktrace

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradle-8.6/bin/gradle :app:assemble${{ matrix.target.flavor }}Debug --no-daemon --stacktrace

      - name: Verify APK contains native lib
        working-directory: android
        run: |
          APK_FILE=$(find app/build/outputs/apk -name '*.apk' -path '*release*' | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "WARNING: No release APK found to verify"
            exit 0
          fi
          echo "Verifying APK: $APK_FILE"
          if unzip -l "$APK_FILE" | grep -q "libotaku_native.so"; then
            echo "[OK] APK contains libotaku_native.so"
          else
            echo "ERROR: APK does NOT contain libotaku_native.so"
            exit 1
          fi
          # Check that Python .so files are NOT in the APK
          if unzip -l "$APK_FILE" | grep -q "libpython3"; then
            echo "WARNING: APK still contains Python .so files (should be removed in Phase 4)"
          else
            echo "[OK] APK does not contain Python .so files"
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OTAku-${{ matrix.target.abi }}-release
          path: android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OTAku-${{ matrix.target.abi }}-debug
          path: android/app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
