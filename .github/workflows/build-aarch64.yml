name: Build .pyz (arch-independent)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/build.yml'
      - '.github/workflows/release.yml'
      - 'android/**'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pyz:
    name: Build otaku.pyz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build otaku.pyz
        run: python3 scripts/build_pyz.py

      - name: Verify .pyz
        run: |
          echo "=== .pyz details ==="
          ls -lh dist/otaku.pyz
          file dist/otaku.pyz
          python3 dist/otaku.pyz --version
          python3 dist/otaku.pyz --help

      - name: Upload .pyz artifact
        uses: actions/upload-artifact@v4
        with:
          name: otaku-pyz
          path: dist/otaku.pyz
          if-no-files-found: error
          retention-days: 30
