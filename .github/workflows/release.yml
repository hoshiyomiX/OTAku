name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build payload_toolkit.pyz
        run: python3 scripts/build_pyz.py

      - name: Copy .pyz to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp dist/payload_toolkit.pyz android/app/src/main/assets/

      - name: Generate signing key for release
        run: |
          keytool -genkeypair \
            -keystore ci-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias release-key \
            -storepass release-store-pass \
            -keypass release-key-pass \
            -dname "CN=PayloadToolkit, OU=Release, O=PayloadToolkit, L=CI, ST=CI, C=US"

      - name: Build release APK (signed)
        working-directory: android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -qo gradle-8.6-bin.zip
          ./gradle-8.6/bin/gradle :app:assembleRelease \
            -PciSigning=true \
            -PciKeystoreFile=../ci-keystore.jks \
            -PciKeystorePass=release-store-pass \
            -PciKeyAlias=release-key \
            -PciKeyPass=release-key-pass \
            --no-daemon --stacktrace

      - name: Collect APKs for release
        if: always()
        run: |
          mkdir -p artifacts
          find android/app/build -type f -name '*.apk' -exec cp {} artifacts/ \;
          echo "--- Collected artifacts ---"
          ls -la artifacts/

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: artifacts/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*.apk
